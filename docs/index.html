<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control del servidor de Minecraft</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <span class="block-icon" aria-hidden="true"></span>
      <h1>Servidor de Minecraft</h1>
    </div>

    <div id="logged-out" class="hidden">
      <p class="lead">Inicia sesion con Discord para ver el estado del servidor.</p>
      <a id="login-link" class="button" href="#">Iniciar sesion con Discord</a>
    </div>

    <div id="logged-in" class="hidden">
      <p class="user">Conectado como <strong id="username"></strong> ·
        <button id="logout" class="link">cerrar sesion</button>
      </p>

      <!-- Shown when the VM is off -->
      <div id="status-off" class="status-off hidden">
        <span class="dot dot-off"></span>
        <div>
          <div id="status-off-title" class="status-off-title">Apagado</div>
          <div class="status-detail">Usa "Encender" para prender el servidor.</div>
        </div>
      </div>

      <!-- Shown while booting or once ready -->
      <ol id="steps" class="steps hidden">
        <li class="step" id="step-power">
          <span class="step-icon"></span>
          <span class="step-label">VM encendida</span>
        </li>
        <li class="step" id="step-world">
          <span class="step-icon"></span>
          <div class="step-body">
            <span class="step-label">Cargando el mundo</span>
            <div class="progress-track"><div class="progress-bar"></div></div>
          </div>
        </li>
        <li class="step" id="step-ready">
          <span class="step-icon"></span>
          <span class="step-label">Listo para jugar</span>
        </li>
      </ol>

      <div id="status-detail" class="status-detail"></div>

      <div class="actions">
        <button id="btn-start" class="button">▶ Encender</button>
        <button id="btn-stop" class="button secondary">■ Apagar</button>
        <button id="btn-refresh" class="link">⟳ Actualizar</button>
        <a id="link-logs" href="logs.html" class="link">Ver logs</a>
      </div>

      <p id="message" class="message"></p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
